name: Cross Compiler Validation

"on":
  workflow_dispatch:
  pull_request:
    paths:
      - CMakeLists.txt
      - CMakePresets.json
      - cmake/**
      - include/**
      - src/**
      - tests/**
      - examples/**
      - tools/**
      - .github/workflows/cross-compiler-validation.yml

jobs:
  linux-matrix:
    name: ${{ matrix.compiler }} C++${{ matrix.standard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            standard: 20
            cxx: g++
            cc: gcc
          - compiler: gcc
            standard: 23
            cxx: g++
            cc: gcc
          - compiler: clang
            standard: 20
            cxx: clang++
            cc: clang
          - compiler: clang
            standard: 23
            cxx: clang++
            cc: clang
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ clang ninja-build

      - name: Record versions and commit
        run: |
          echo "Commit: $GITHUB_SHA"
          cmake --version
          ninja --version
          ${{ matrix.cxx }} --version

      - name: Configure ${{ matrix.compiler }} C++${{ matrix.standard }}
        run: |
          cmake -S . -B build/${{ matrix.compiler }}-cxx${{ matrix.standard }} \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_CXX_STANDARD=${{ matrix.standard }} \
            -DPB_BUILD_TESTS=ON \
            -DPB_BUILD_EXAMPLES=ON \
            -DPB_BUILD_BENCHMARKS=OFF

      - name: Build ${{ matrix.compiler }} C++${{ matrix.standard }}
        run: cmake --build build/${{ matrix.compiler }}-cxx${{ matrix.standard }} --parallel

      - name: Test ${{ matrix.compiler }} C++${{ matrix.standard }}
        run: ctest --test-dir build/${{ matrix.compiler }}-cxx${{ matrix.standard }} --output-on-failure

  msvc-cxx20:
    name: MSVC C++20
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Record versions and commit
        shell: pwsh
        run: |
          Write-Host "Commit: $env:GITHUB_SHA"
          cmake --version
          cl

      - name: Configure MSVC C++20
        shell: pwsh
        run: |
          cmake -S . -B build/msvc-cxx20 `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_CXX_STANDARD=20 `
            -DPB_BUILD_TESTS=ON `
            -DPB_BUILD_EXAMPLES=ON `
            -DPB_BUILD_BENCHMARKS=OFF

      - name: Build MSVC C++20
        shell: pwsh
        run: cmake --build build/msvc-cxx20 --config Debug --parallel

      - name: Test MSVC C++20
        shell: pwsh
        run: ctest --test-dir build/msvc-cxx20 -C Debug --output-on-failure

  package-release-clean:
    name: Package release preset clean Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang ninja-build

      - name: Record versions and commit
        run: |
          echo "Commit: $GITHUB_SHA"
          cmake --version
          ninja --version
          clang++ --version

      - name: Configure package-release-clang-ninja
        run: cmake --preset package-release-clang-ninja

      - name: Build package-release-clang-ninja
        run: cmake --build --preset package-release-clang-ninja --parallel

      - name: Test package-release-clang-ninja
        run: ctest --preset package-release-clang-ninja --output-on-failure

      - name: Build TGZ package
        run: cmake --build --preset package-release-clang-ninja --target package
